name: 扶她
description: "本目录涉及扶她相关的主题，扶她在ACG文化中，特指同时拥有两性的性特征(胸部、性器官等)的角色，亦即俗称的两性人。这是一种架空的属性。扶她题材的作品通常会探讨性别认同、身体变化和自我认知等主题，常见于动漫、漫画和小说等媒介中。这类作品可能包含情色元素，但也有一些作品更侧重于探讨性别认同和社会关系等深层议题。"
